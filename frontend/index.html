<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Appointment Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
      color: #7eb8f7;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 30px;
    }

    #phone-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1c1f2a;
      color: #fff;
      font-size: 1rem;
      width: 220px;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    #connect-btn {
      background: #3b82f6;
      color: white;
    }

    #connect-btn:hover { background: #2563eb; }

    #mic-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #1e293b;
      border: 3px solid #3b82f6;
      font-size: 2rem;
      display: none;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transition: all 0.2s;
    }

    #mic-btn.recording {
      background: #ef4444;
      border-color: #ef4444;
      box-shadow: 0 0 20px #ef444488;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    #status {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 24px;
      min-height: 20px;
    }

    #chat {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 85%;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .agent {
      background: #1e2a1e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #22c55e;
    }

    #latency-bar {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #555;
      display: none;
    }

    #latency-bar span { color: #7eb8f7; margin: 0 6px; }
  </style>
</head>
<body>

  <h1>🏥 Clinical Voice Agent</h1>
  <p class="subtitle">Speak in English, Hindi, or Tamil</p>

  <div id="phone-section">
    <input id="phone" type="text" placeholder="Enter your phone number" value="9999999999"/>
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>

  <button id="mic-btn" onclick="toggleMic()">🎙️</button>
  <div id="status">Enter your phone number and click Connect</div>

  <div id="chat"></div>

  <div id="latency-bar">
    Last response → STT: <span id="l-stt">-</span>ms &nbsp;|&nbsp;
    LLM: <span id="l-llm">-</span>ms &nbsp;|&nbsp;
    TTS: <span id="l-tts">-</span>ms &nbsp;|&nbsp;
    <b>Total: <span id="l-total">-</span>ms</b>
  </div>

<script>
  let ws, mediaRecorder, audioChunks = [];
  let isRecording = false;

  function connect() {
    const phone = document.getElementById('phone').value.trim();
    if (!phone) return alert('Enter a phone number');

    ws = new WebSocket(`ws://localhost:8000/ws/${phone}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      document.getElementById('status').textContent = '✅ Connected! Hold the mic button to speak.';
      document.getElementById('mic-btn').style.display = 'flex';
      document.getElementById('connect-btn').disabled = true;
    };

   ws.onmessage = async (event) => {
      try {
        // Try to parse as JSON first
        if (typeof event.data === 'string') {
          const data = JSON.parse(event.data);
          addMessage('user', `🎙️ ${data.transcript}`);
          addMessage('agent', `🤖 ${data.reply}`);
          const l = data.latency;
          document.getElementById('l-stt').textContent = l.stt_ms;
          document.getElementById('l-llm').textContent = l.llm_ms;
          document.getElementById('l-tts').textContent = l.tts_ms;
          document.getElementById('l-total').textContent = l.total_ms;
          document.getElementById('latency-bar').style.display = 'block';
          document.getElementById('status').textContent = `Language detected: ${data.language}`;
          return;
        }

        // Audio bytes
        if (event.data instanceof Blob) {
          const url = URL.createObjectURL(event.data);
          const audio = new Audio(url);
          audio.play();
          return;
        }

        if (event.data instanceof ArrayBuffer) {
          const blob = new Blob([event.data], { type: 'audio/mp3' });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.play();
          return;
        }
      } catch (e) {
        console.error('Message handling error:', e);
      }
    };

    ws.onerror = () => {
      document.getElementById('status').textContent = '❌ Connection error. Is the server running?';
    };

    ws.onclose = () => {
      document.getElementById('status').textContent = '🔌 Disconnected.';
    };
  }

  async function toggleMic() {
    if (!isRecording) {
      // Start recording
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      audioChunks = [];

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
        const buffer = await blob.arrayBuffer();
        ws.send(buffer);
        document.getElementById('status').textContent = '⏳ Processing...';
      };

      mediaRecorder.start(100);
      isRecording = true;
      document.getElementById('mic-btn').classList.add('recording');
      document.getElementById('mic-btn').textContent = '⏹️';
      document.getElementById('status').textContent = '🔴 Recording... click again to send';
    } else {
      // Stop and send
      mediaRecorder.stop();
      isRecording = false;
      document.getElementById('mic-btn').classList.remove('recording');
      document.getElementById('mic-btn').textContent = '🎙️';
    }
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
